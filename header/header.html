<style>
  /* Custom styles for header - minimal required */
  #site-header.header-scrolled {
    background: rgba(250, 246, 236, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.12);
  }
  #site-header.header-scrolled.header-on-dark {
    background: rgba(13, 13, 13, 0.85);
    border-color: rgba(255, 255, 255, 0.1);
  }
  #site-header.header-on-dark .nav-link {
    color: rgba(255, 255, 255, 0.9);
  }
  #site-header.header-on-dark .nav-link.active {
    color: #6CB33F;
  }
  #site-header.header-on-dark .menu-bar {
    color: white;
  }
  /* DEFAULT STATE - underline is ALWAYS visible but transparent/light */
  .active-indicator {
    width: 0;
    opacity: 0.3;
    transition: all 0.5s cubic-bezier(0.65, 0, 0.35, 1);
  }
  /* ACTIVE STATE - underline is FULLY visible with glow */
  .nav-link.active .active-indicator {
    width: 100% !important;
    opacity: 1 !important;
    box-shadow: 0 0 12px rgba(108, 179, 63, 0.4);
  }
  .nav-link.active {
    color: #4E9A2D;
  }
  /* HOVER STATE - underline becomes visible on hover too */
  .nav-link:hover .active-indicator {
    width: 100%;
    opacity: 0.7;
  }
  /* But if it's already active, keep it at 100% and full opacity */
  .nav-link.active:hover .active-indicator {
    opacity: 1 !important;
  }
  /* Mobile active state - ALWAYS visible when on the page */
  .active-indicator-mobile {
    width: 0;
    opacity: 0.3;
    transition: all 0.5s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .mobile-nav-link.active .active-indicator-mobile {
    width: 100% !important;
    opacity: 1 !important;
  }
  .mobile-nav-link.active {
    color: #6CB33F !important;
  }
  .mobile-nav-link:hover .active-indicator-mobile {
    width: 100%;
    opacity: 0.7;
  }
  .mobile-nav-link.active:hover .active-indicator-mobile {
    opacity: 1 !important;
  }
  /* Hamburger animation */
  #menu-toggle.is-open .menu-bar:nth-child(1) {
    transform: translateY(8px) rotate(45deg);
  }
  #menu-toggle.is-open .menu-bar:nth-child(2) {
    opacity: 0;
  }
  #menu-toggle.is-open .menu-bar:nth-child(3) {
    transform: translateY(-8px) rotate(-45deg);
  }
  #mobile-menu.is-open {
    transform: translateY(0);
  }
  /* Responsive border radius utilities (since Tailwind doesn't have all values) */
  @media (min-width: 640px) {
    #site-header {
      border-radius: 32px;
    }
  }
  @media (min-width: 1024px) {
    #site-header {
      border-radius: 40px;
    }
  }
</style>
<script>
  /* SIEC — Header behavior with curved edges and active state */
  (function initHeader() {
    const header = document.getElementById('site-header');
    if (!header) return;
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('mobile-menu');
    // Determine current page from URL — matched by keyword rather than an
    // exact-string map, so it keeps working regardless of trailing slashes,
    // base paths, or how deep the page is nested.
    const path = window.location.pathname.toLowerCase();
    function detectActivePage() {
      if (path.includes('/about')) return 'about';
      if (path.includes('/services')) return 'services';
      if (path.includes('/projects')) return 'projects';
      if (path.includes('/careers')) return 'careers';
      if (path.includes('/contact')) return 'contact';
      if (path.includes('/home') || path === '/' || path.endsWith('/index.html')) return 'home';
      return 'home';
    }
    const activePage = detectActivePage();
    // Add active class to matching nav links - this makes the underline permanently visible
    document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(link => {
      const page = link.getAttribute('data-page');
      if (page === activePage) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
    // Hamburger open/close
    if (toggle && menu) {
      toggle.addEventListener('click', () => {
        const isOpen = menu.classList.toggle('is-open');
        toggle.classList.toggle('is-open', isOpen);
        toggle.setAttribute('aria-expanded', String(isOpen));
        menu.setAttribute('aria-hidden', String(!isOpen));
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });
      menu.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => {
          menu.classList.remove('is-open');
          toggle.classList.remove('is-open');
          document.body.style.overflow = '';
        });
      });
    }
    // Dark-on-hero detection
    const heroSection = document.querySelector('main > section:first-of-type');
    const heroIsDark = heroSection && 
      getComputedStyle(heroSection).backgroundColor !== 'rgba(0, 0, 0, 0)' &&
      heroSection.id === 'hero';
    if (heroIsDark) {
      header.classList.add('header-on-dark');
    }
    // Scroll state management
    const applyScrollState = () => {
      const scrolled = window.scrollY > 40;
      header.classList.toggle('header-scrolled', scrolled);
      
      if (heroIsDark) {
        header.classList.toggle('header-on-dark', !scrolled);
      }
    };
    applyScrollState();
    window.addEventListener('scroll', applyScrollState, { passive: true });
    // Re-bind magnetic + cursor highlight behaviour
    if (window.SIEC) {
      if (SIEC.rebindMagnetic) SIEC.rebindMagnetic();
      if (SIEC.bindCursorTargets) SIEC.bindCursorTargets();
    }
  })();
</script>
